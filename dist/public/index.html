    <script>
      (function() {
        const mode = localStorage.getItem('colorMode') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        const isDark = mode === 'dark';
        document.documentElement.classList.toggle('dark', isDark);
        const tabColor = isDark ? '#161b2a' : '#e4ecf3';
        const themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) themeMeta.setAttribute('content', tabColor);
        const tileMeta = document.querySelector('meta[name="msapplication-TileColor"]');
        if (tileMeta) tileMeta.setAttribute('content', tabColor);
        const statusMeta = document.querySelector('meta[name="apple-mobile-web-app-status-bar-style"]');
        if (statusMeta) statusMeta.setAttribute('content', isDark ? 'black-translucent' : 'default');
      })();
